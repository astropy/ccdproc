# Turn the outcome of the expected-failures strict array-API jobs into
# commit statuses on the PR head. This runs as a separate workflow_run
# workflow because pull_request runs for fork PRs get a read-only
# GITHUB_TOKEN and cannot post statuses themselves.
#
# Commit statuses are used rather than check runs because check runs
# created with the Actions token get attached to the oldest github-actions
# check suite for the SHA, and the PR merge box renders only the newest
# suite per workflow -- so on any PR with more than one CI run (any push or
# close/reopen) the check vanished from the merge box. Statuses attach
# directly to the SHA and always render there.
#
# Each status uses a stable context ("strict-status/" plus the matrix entry
# name); the outcome is carried by the state and description. An expected
# test failure is reported as success (the statuses API has no neutral
# state) with a description saying so, so the PR rollup stays green. These
# statuses are informational only and are not intended to be required
# checks while the failures are expected.
#
# Note: workflow_run workflows execute from the default branch, so changes to
# this file only take effect once merged.
name: Strict array API status

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  statuses: write
  actions: read

jobs:
  report:
    # Only report on pull_request runs. CI also triggers on push (all
    # branches) and schedule, so without this gate a same-repo PR branch gets
    # two completed CI runs per push and this workflow would post duplicate
    # (possibly contradictory) checks on the same head SHA.
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Download strict job outcomes
      id: download
      # The artifacts are missing for CI runs from before the record/upload
      # steps became `if: always()` (or when the whole CI run was skipped);
      # tolerate that and skip the check runs below. Runs after that change
      # should always upload an outcome artifact per matrix entry.
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # 8.0.1
      with:
        pattern: strict-job-outcome-*
        merge-multiple: false
        path: strict-outcomes
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Post commit statuses
      if: steps.download.outcome == 'success'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const run = context.payload.workflow_run;
          const root = 'strict-outcomes';
          // One artifact per expected-failures matrix entry, each holding a
          // strict-outcome.json written by ci_tests.yml with the schema
          // {"name": "<matrix name>", "state": "success"|"failure"|"error"}.
          // download-artifact extracts each artifact into its own
          // strict-job-outcome-* subdirectory when the pattern matches
          // several artifacts, but flattens a single match directly into the
          // root -- scan for the JSON files so both layouts work.
          let entries = [];
          try {
            entries = fs.readdirSync(root, { withFileTypes: true });
          } catch (err) {
            core.info(`No outcome artifacts downloaded (${err.message}); nothing to report.`);
            return;
          }
          const outcomes = [];
          if (entries.some((e) => e.isFile() && e.name === 'strict-outcome.json')) {
            outcomes.push({
              jsonPath: path.join(root, 'strict-outcome.json'),
              // The flat layout loses the artifact name; the JSON inside
              // normally supplies the real one.
              fallbackName: 'strict-job',
            });
          }
          for (const entry of entries) {
            if (entry.isDirectory() && entry.name.startsWith('strict-job-outcome-')) {
              outcomes.push({
                jsonPath: path.join(root, entry.name, 'strict-outcome.json'),
                fallbackName: entry.name.replace('strict-job-outcome-', ''),
              });
            }
          }
          if (outcomes.length === 0) {
            core.info('No strict-outcome.json files found in downloaded artifacts; nothing to report.');
            return;
          }
          for (const { jsonPath, fallbackName } of outcomes) {
            // Fall back to the artifact name and an error state if the JSON
            // is missing or malformed, so a broken upload still surfaces.
            let name = fallbackName;
            let state = 'error';
            try {
              const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              if (typeof data.name === 'string' && data.name) {
                name = data.name;
              }
              if (['success', 'failure', 'error'].includes(data.state)) {
                state = data.state;
              } else {
                core.warning(`Unrecognized state ${JSON.stringify(data.state)} in ${jsonPath}; reporting an error state.`);
              }
            } catch (err) {
              core.warning(`Could not read outcome JSON at ${jsonPath} (${err.message}); reporting an error state.`);
            }
            // Descriptions must stay under the statuses API's 140-character
            // limit; the target_url links to the CI run for details.
            let statusState;
            let description;
            if (state === 'success') {
              statusState = 'success';
              description = 'Strict array-API tests passed; ' +
                'the expected-failures carve-out for this job can be retired.';
            } else if (state === 'failure') {
              statusState = 'success';
              description = 'Strict array-API tests failed (expected until ' +
                'the remaining array-API bugs are fixed).';
            } else {
              statusState = 'error';
              description = 'Strict job did not complete its tests step; ' +
                'infrastructure error, not a test failure.';
            }
            // Stable context; the outcome lives in the state and
            // description so the merge box does not accumulate
            // differently-named statuses per outcome.
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: run.head_sha,
              state: statusState,
              target_url: run.html_url,
              description,
              context: `strict-status/${name}`,
            });
          }
